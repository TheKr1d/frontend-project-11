<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Reader</title>
  <!-- Подключаем Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main class="container py-4">
    <!-- Modal -->
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="false">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modalDescription"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            <button type="button" class="btn btn-primary" id="modal-read-all">Читать полностью</button>
          </div>
        </div>
      </div>
    </div>
    </div>
    <div class="row justify-content-center mb-4">
      <div class="col-12 col-md-8 col-lg-6">
        <h1 class="mb-3">RSS Reader</h1>

        <form id="rss-form" class="mb-3">
          <div class="mb-3">
            <label for="rss-url" class="form-label">Ссылка RSS</label>
            <div class="input-group">
              <input id="rss-url" name="url" type="text" class="form-control" placeholder="Введите URL RSS"
                aria-label="Ссылка RSS" />
              <button type="submit" class="btn btn-primary" id="submit-btn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="btn-spinner" role="status"
                  aria-hidden="true"></span>
                <span id="btn-text">Добавить</span>
              </button>
            </div>
            <small class="text-muted d-block mt-1">
              Например: https://rosinvest.com/cm/feed
            </small>
            <div id="feedbackMessage"></div>
          </div>
        </form>
      </div>
    </div>
    <div id="content"></div>


  </main>

  <script type="module" src="/src/index.js"></script>
</body>

</html>
